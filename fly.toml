# fly.toml — Fly.io free-tier deployment configuration
# Deploy via: fly launch --config notification-server/fly.toml
# Docs: https://fly.io/docs/reference/configuration/

app = "snapinfo-notification-server"
primary_region = "iad"   # Change: ams (Amsterdam), sin (Singapore), syd (Sydney), etc.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https   = true
  auto_stop_machines  = true   # free tier — stop when idle
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "15s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 3001
    timeout      = "5s"
    type         = "http"
